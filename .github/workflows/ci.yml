name: Check-up CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # Não usar cache automático pois temos pipenv

      - name: 📝 Generate cache key
        id: cache-key
        run: |
          echo "key=deps-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-${{ hashFiles('Pipfile.lock') }}" >> $GITHUB_OUTPUT

      - name: 💾 Cache pipenv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pipenv
            ~/.local/share/virtualenvs
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            deps-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8
          pipenv install --dev --system

      - name: 🔍 Lint with flake8
        run: |
          # Verificar apenas erros críticos que quebram o build
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --max-line-length=150
          
          # Verificar outros problemas mas não falhar o build
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=150 \
            --extend-ignore=W191,W293,W292,E303,F401,F841,E712,E124,E201 --statistics

  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and export to Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: check-up:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=build
          cache-to: |
            type=gha,mode=max,scope=build
          platforms: linux/amd64

      - name: 🧪 Test Docker image
        run: |
          docker run --rm check-up:test python -c "print('✅ Docker image built successfully')"
          docker run --rm check-up:test python -c "import playwright; print('✅ Playwright available')"

      - name: 💾 Save Docker image
        run: |
          docker save check-up:test | gzip > check-up-image.tar.gz

      - name: 📤 Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: check-up-image.tar.gz
          retention-days: 1

  test:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    strategy:
      fail-fast: false
      matrix:
        test-group: [unit, integration]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_healthcheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

      minio:
        image: minio/minio:RELEASE.2024-01-16T16-07-38Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
          --health-start-period 10s
          --command "server /data --console-address :9001"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python for test runner
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Restore pipenv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pipenv
            ~/.local/share/virtualenvs
          key: ${{ needs.lint.outputs.cache-key }}
          restore-keys: |
            deps-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-

      - name: 📥 Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🐳 Load Docker image
        run: |
          docker load < check-up-image.tar.gz

      - name: 📂 Create data directories for Docker Compose
        run: |
          mkdir -p data/postgres data/minio
          chmod -R 777 data

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --dev --system

      - name: 🎭 Install Playwright browsers
        run: |
          playwright install --with-deps firefox

      - name: ⚡ Wait for services
        run: |
          echo "🔄 Waiting for PostgreSQL..."
          timeout 60s bash -c 'until pg_isready -h localhost -p 5432 -U postgres 2>/dev/null; do 
            echo "PostgreSQL not ready yet, waiting..."; 
            sleep 2; 
          done'
          echo "✅ PostgreSQL is ready"
          
          echo "🔄 Waiting for MinIO..."
          timeout 90s bash -c 'until curl -s -f http://localhost:9000/minio/health/live >/dev/null 2>&1; do 
            echo "MinIO not ready yet, waiting..."; 
            sleep 3; 
          done'
          
          echo "✅ All services are ready"

      - name: 🔧 Prepare test environment
        run: |
          # Criar arquivo .env para testes
          cat > .env << 'EOF'
          HEADLESS=true
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=test_healthcheck
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_healthcheck
          MINIO_ENDPOINT=localhost:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_SECURE=false
          MINIO_BUCKET=test-bucket
          SCRAPER_TIMEOUT=600
          PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
          EOF

      - name: 🗄️ Initialize database
        run: |
          python -c "
          from sqlalchemy import create_engine
          from models import Portal, Entry, Advertisement, URLQueue, QueueStatus
          
          DATABASE_URL = 'postgresql://postgres:postgres@localhost:5432/test_healthcheck'
          engine = create_engine(DATABASE_URL)
          
          print('📋 Creating database tables...')
          Portal.metadata.create_all(engine)
          Entry.metadata.create_all(engine)
          Advertisement.metadata.create_all(engine)
          URLQueue.metadata.create_all(engine)
          QueueStatus.metadata.create_all(engine)
          print('✅ Database tables created successfully!')
          "

      - name: 🧪 Run unit tests
        if: matrix.test-group == 'unit'
        run: |
          pytest tests/plays/ tests/test_scrape_no_openai.py -v --tb=short --strict-markers --disable-warnings
          echo "✅ Unit tests completed"

      - name: 🔗 Run integration tests
        if: matrix.test-group == 'integration'
        run: |
          pytest tests/test_integration_improvements.py -v --tb=short --strict-markers --disable-warnings
          echo "✅ Integration tests completed"

      - name: 🐞 Debug service issues
        if: failure()
        run: |
          echo "🔍 Debugging service issues..."
          
          echo "=== Docker container status ==="
          docker ps -a
          
          echo "=== Service logs ==="
          docker logs $(docker ps -a -q --filter "name=postgres")
          docker logs $(docker ps -a -q --filter "name=minio")
          
          echo "=== Network status ==="
          docker network ls
          docker network inspect $(docker network ls -q --filter "name=github") || true
          
          echo "=== Check port availability ==="
          nc -zv localhost 5432 || echo "PostgreSQL port not accessible"
          nc -zv localhost 9000 || echo "MinIO port not accessible"
          
          echo "=== System status ==="
          df -h
          free -h || true
          
          echo "Debug information collected."

      - name: 📊 Generate test report
        if: always()
        run: |
          echo "## 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Test Group: ${{ matrix.test-group }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  compose-test:
    name: 🐙 Docker Compose Test
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🐳 Load Docker image
        run: |
          docker load < check-up-image.tar.gz

      - name: 📂 Create data directories for Docker Compose
        run: |
          mkdir -p data/postgres data/minio
          chmod -R 777 data

      - name: 🔧 Prepare Docker Compose environment
        run: |
          # Criar arquivo .env para Docker Compose
          cat > .env << 'EOF'
          HEADLESS=true
          DATABASE_URL=postgresql://postgres:supersecret@healthcheck_db:5432/healthcheck
          MINIO_ENDPOINT=healthcheck_minio:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_SECURE=false
          MINIO_BUCKET=scraped-articles
          SCRAPER_TIMEOUT=600
          EOF
          
          # Criar arquivo de ambiente para PostgreSQL
          mkdir -p docker
          cat > docker/.env-postgres << 'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=supersecret
          POSTGRES_DB=healthcheck
          EOF

      - name: 🚀 Start services with Docker Compose
        run: |
          docker compose -f compose.ci.yml up -d --wait
          echo "✅ All services started successfully"

      - name: 🔍 Verify services health
        run: |
          # Verificar PostgreSQL
          docker compose -f compose.ci.yml exec -T db pg_isready -U postgres
          
          # Verificar MinIO
          timeout 30s bash -c 'until docker compose -f compose.ci.yml exec -T minio curl -f http://localhost:9000/minio/health/live; do sleep 2; done'
          
          # Inicializar MinIO bucket usando python
          docker compose -f compose.ci.yml run --rm scraper python -c "
          from minio import Minio
          from decouple import config
          
          client = Minio(
              config('MINIO_ENDPOINT'),
              access_key=config('MINIO_ACCESS_KEY'),
              secret_key=config('MINIO_SECRET_KEY'),
              secure=config('MINIO_SECURE', cast=bool)
          )
          
          bucket_name = config('MINIO_BUCKET')
          if not client.bucket_exists(bucket_name):
              client.make_bucket(bucket_name)
              print(f'✅ Bucket {bucket_name} created')
          else:
              print(f'ℹ️ Bucket {bucket_name} already exists')
          "
          
          # Verificar se o scraper pode conectar aos serviços
          docker compose -f compose.ci.yml run --rm scraper python -c "
          from sqlalchemy import create_engine
          from decouple import config
          
          # Testar conexão com banco
          engine = create_engine(config('DATABASE_URL'))
          engine.connect()
          print('✅ Database connection successful')
          
          # Testar MinIO
          from minio import Minio
          client = Minio(
              config('MINIO_ENDPOINT'),
              access_key=config('MINIO_ACCESS_KEY'),
              secret_key=config('MINIO_SECRET_KEY'),
              secure=config('MINIO_SECURE', cast=bool)
          )
          client.list_buckets()
          print('✅ MinIO connection successful')
          "

      - name: 🧪 Run basic scraper test
        run: |
          docker compose -f compose.ci.yml run --rm scraper python -c "
          from plays.base import BasePlay
          print('✅ BasePlay import successful')
          "

      - name: 🐞 Debug compose issues
        if: failure()
        run: |
          echo "🔍 Debugging Docker Compose issues..."
          
          echo "=== Docker container status ==="
          docker ps -a
          
          echo "=== Service logs ==="
          docker compose -f compose.ci.yml logs
          
          echo "=== Volume info ==="
          docker volume ls
          
          echo "=== Directory structure ==="
          find data -type d | sort
          
          echo "=== Free space ==="
          df -h
          
          echo "Debug information collected."

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker compose -f compose.ci.yml down -v --remove-orphans
          docker system prune -f

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🐳 Load Docker image
        run: docker load < check-up-image.tar.gz

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'check-up:test'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [lint, build, test, compose-test]
    if: always()
    steps:
      - name: 📊 Generate final summary
        run: |
          echo "## 🎯 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐙 Compose Test | ${{ needs.compose-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.lint.result }}" == "success" && "${{ needs.build.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.compose-test.result }}" == "success" ]]; then
            echo "✅ **All checks passed!** Ready to merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed.** Please review the errors above." >> $GITHUB_STEP_SUMMARY
          fi 