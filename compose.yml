services:
  scraper:
    env_file: .env
    build:
      context: .
    container_name: healthcheck_scraper
    volumes:
      - .:/project/
      - ./sessions/:/project/sessions/
      - ./logs/:/var/log/
    tty: true
    depends_on:
      - db
  server-web:
    build:
      context: ./web/server
      dockerfile: Dockerfile
    container_name: healthcheck_web
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - minio
    volumes:
      - ./web/server:/app
    command: uvicorn web.server.main:app --host 0.0.0.0 --port 8000 --reload
  client-web:
    build:
      context: ./web/client
      dockerfile: Dockerfile
    container_name: healthcheck_client
    ports:
      - "5173:5173"
    volumes:
      - ./web/client:/app
    environment:
      - NODE_ENV=development
    command: pnpm run dev --host 0.0.0.0
    depends_on:
      - server-web
  db:
    image: postgres:16
    container_name: healthcheck_db
    env_file: ./docker/.env-postgres
    ports:
      - "15433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio
    container_name: healthcheck_minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  pgdata:
    driver: local
  minio_data:
    driver: local
